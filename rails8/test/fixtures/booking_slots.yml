tomorrow_morning:
  booking_owner: salon
  starts_at: <%= 1.day.from_now.change(hour: 10, min: 0) %>
  ends_at: <%= 1.day.from_now.change(hour: 10, min: 30) %>
  capacity: 1
  active: true
  label: Morning

tomorrow_noon:
  booking_owner: salon
  starts_at: <%= 1.day.from_now.change(hour: 11, min: 0) %>
  ends_at: <%= 1.day.from_now.change(hour: 11, min: 30) %>
  capacity: 1
  active: true
  label: Noon
