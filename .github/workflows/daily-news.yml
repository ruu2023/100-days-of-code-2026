name: Daily AI+Security News with Ollama

on:
  workflow_dispatch:
  schedule:
    # 毎日 09:17 JST = 00:17 UTC
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ${{ runner.os }}-ollama-${{ hashFiles('.github/workflows/daily-news.yml') }}
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          sleep 10

      - name: Pull model
        run: |
          ollama pull hf.co/LiquidAI/LFM2.5-1.2B-JP-GGUF:Q8_0
          ollama list

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "scripts/package-lock.json"

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Install Beads CLI
        run: curl -sSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash

      - name: Run script with Ollama
        env:
          USE_OLLAMA: "true"
        run: node scripts/day042.mjs

      - name: Debug files
        run: |
          echo "PWD=$(pwd)"
          ls -la
          ls -la docs/api/ || true
          test -f docs/api/data.json && (echo "data.json exists"; cat docs/api/data.json) || echo "data.json NOT found"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/ .beads/

          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi

          git commit -m "chore: update daily news with ollama"
          git push
