name: Ollama Test

on:
  push:
    branches:
      - main
      - ollama-test
  pull_request:
  workflow_dispatch:      # 手動実行用

jobs:
  ollama-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          sleep 10
          # サービス起動確認
          curl -s http://localhost:11434/api/tags || echo "Ollama starting..."

      - name: Pull model
        run: |
          ollama pull hf.co/LiquidAI/LFM2.5-1.2B-JP-GGUF:Q8_0
          ollama list

      - name: Run custom prompt test
        run: |
          echo "=== カスタムプロンプトテスト ==="
          TEXT="日本の大手携帯キャリアが販売する一部のAndroidスマートフォンには、「AppCloud」や「App Selector」といったシステムアプリが密かに混入し、通知をきっかけに利用者の意図しないアプリを勝手にインストールする事例が多数報告され、問題視されています。これらのアプリはOS動作に必要そうな名称で巧妙に偽装され、利用者はアドウェアと認識しづらく、通常の方法では削除が困難な上、無効化してもアップデート後に復活する可能性も指摘されています。海外では「削除不能なスパイウェア」と批判され、生体情報などの機密情報を扱う可能性まで指摘されており、極めて悪質です。キャリアやメーカーは、製品の信頼性を著しく毀損するこの行為を厳に慎むべきでしょう。"

          echo "入力テキスト: $TEXT"
          echo ""
          echo "AIによる要約:"
          SUMMARY=$(ollama run hf.co/LiquidAI/LFM2.5-1.2B-JP-GGUF:Q8_0 "次の文章を3行程度で要約してください: $TEXT")
          echo "$SUMMARY"
          
          mkdir -p docs/api
          jq -n --arg summary "$SUMMARY" '{summary: $summary}' > docs/api/summary.json

      - name: Show model info
        run: |
          echo "=== モデル情報 ==="
          ollama list
          ollama ps

      - name: Output summary
        run: |
          echo ""
          echo "========================================"
          echo "🎉 Ollama GitHub Actions テスト完了！"
          echo "========================================"
          echo " modelos: $(ollama list | wc -l)"
          echo " running: $(ollama ps | grep -c LFM2.5)"

      - name: Commit and push summary.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/summary.json
          git commit -m "docs: auto-generate summary.json via GitHub Actions" || echo "No changes to commit"
          git push